name: Vancity
kind: company
description: >-
  Vancity (Vancouver City Savings Credit Union) is a member-owned financial
  co-operative headquartered in Vancouver, British Columbia, and the largest
  community credit union in Canada, with over 543,000 members, roughly CA$35
  billion in assets, and about 60 branches across the Lower Mainland and
  Vancouver Island. Founded in 1946 as an open-bond credit union, it is
  provincially chartered and cooperatively governed, offering retail and
  business banking, mortgages, foreign exchange, Visa cards, insurance, and
  investment advice, with values-based and impact-lending positioning. Vancity
  exposes no first-party public developer API portal: developer.vancity.com and
  developers.vancity.com do not resolve. It participates in Canada's shared
  payment rails through Central 1 (its banking-technology and payments provider,
  including enhanced Interac e-Transfer real-time payments) and Payments Canada,
  while third-party consumer data access is provided through aggregators such as
  Plaid and Flinks. Canada's federal Consumer-Driven Banking (open banking)
  framework is legislated but not yet operational, so any programmatic account
  access today is voluntary and aggregator-mediated rather than served by a
  documented Vancity API.
